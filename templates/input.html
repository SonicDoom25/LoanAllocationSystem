{% extends "base.html" %}
{% block content %}

<div class="text-center mb-5">

  <h1 class="hero-title mb-3">

    Resource
    <span class="gradient-text">
      Configuration
    </span>

  </h1>

  <p class="hero-subtitle">
    Configure processes and resource vectors for
    safe-state allocation analysis.
  </p>

</div>

<div class="glass-card p-5">

  <form method="post">

    <div class="row g-4">

      <div class="col-md-6">

        <label class="form-label">
          Number of Processes
        </label>

        <input name="processes"
               type="number"
               min="1"
               class="form-control"
               required>

      </div>

      <div class="col-md-6">

        <label class="form-label">
          Number of Resources
        </label>

        <input name="resources"
               type="number"
               min="1"
               class="form-control"
               required>

      </div>

    </div>

    <div class="text-center mt-5">

      <button class="btn btn-primary btn-lg">

        <i class="bi bi-arrow-right-circle-fill"></i>
        Continue

      </button>

    </div>

  </form>

</div>

{% endblock %}
