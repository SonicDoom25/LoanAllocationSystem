{% extends "base.html" %}
{% block content %}

<div class="mb-5">

  <h1 class="hero-title mb-3">

    Edit
    <span class="gradient-text">
      Request
    </span>

  </h1>

  <p class="hero-subtitle">
    Modify applicant and allocation details.
  </p>

</div>

<form method="post">

<div class="glass-card p-5">

  <div class="row g-4">

    <div class="col-md-6">

      <label class="form-label">
        Applicant Name
      </label>

      <input name="applicantName"
             class="form-control"
             value="{{ r.applicantName }}">

    </div>

    <div class="col-md-6">

      <label class="form-label">
        Email
      </label>

      <input name="email"
             class="form-control"
             value="{{ r.email }}">

    </div>

    <div class="col-md-6">

      <label class="form-label">
        Requested Amount
      </label>

      <input type="number"
             name="requestedAmount"
             class="form-control"
             value="{{ r.requestedAmount }}">

    </div>

    <div class="col-md-6">

      <label class="form-label">
        Approved Amount
      </label>

      <input type="number"
             name="approvedAmount"
             class="form-control"
             value="{{ r.approvedAmount }}">

    </div>

    <div class="col-md-6">

      <label class="form-label">
        Monthly Income
      </label>

      <input type="number"
             name="income"
             class="form-control"
             value="{{ r.income }}">

    </div>

    <div class="col-md-6">

      <label class="form-label">
        Repayment Months
      </label>

      <input type="number"
             name="months"
             class="form-control"
             value="{{ r.months }}">

    </div>

    <div class="col-md-6">

      <label class="form-label">
        Status
      </label>

      <select name="status"
              class="form-select">

        <option {% if r.status=='Pending' %}selected{% endif %}>
          Pending
        </option>

        <option {% if r.status=='Approved' %}selected{% endif %}>
          Approved
        </option>

        <option {% if r.status=='Rejected' %}selected{% endif %}>
          Rejected
        </option>

      </select>

    </div>

  </div>

  <div class="d-flex gap-3 mt-5">

    <button class="btn btn-primary">

      <i class="bi bi-check-circle-fill"></i>
      Save Changes

    </button>

    <a class="btn btn-outline-light"
       href="{{ url_for('view_request', id_=r.id) }}">

      Cancel

    </a>

  </div>

</div>

</form>

{% endblock %}
