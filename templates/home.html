{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="text-center mb-4">
    <h1>Loan Allocation System (Banker's Algorithm)</h1>
    <p class="lead">Instant analysis, persistent bank reserve and history</p>
  </div>

  <div class="row align-items-center mb-3">
    <div class="col-md-8">
      <label class="form-label">Bank Reserve</label>
      <div class="progress" style="height: 28px;">
        <div id="reserveBar" class="progress-bar" role="progressbar"
             style="width: 100%;">
          ₹{{ bank_reserve }}
        </div>
      </div>
      <small id="reserveText" class="text-muted">Remaining: ₹{{ bank_reserve }} / ₹{{ bank_reserve_default }}</small>
    </div>
    <div class="col-md-4 text-end">
      <button id="resetReserveBtn" class="btn btn-outline-danger">Reset Bank Reserve</button>
    </div>
  </div>

  <div class="d-flex gap-2 justify-content-center mb-4">
    <a class="btn btn-primary" href="{{ url_for('loan_application') }}">Apply for Loan</a>
    <a class="btn btn-secondary" href="{{ url_for('requests_page') }}">Loan History</a>
    <a class="btn btn-success" href="{{ url_for('analysis') }}">View System Analysis</a>
  </div>
</div>

<script>
async function refreshReserveBar(){
  try {
    const resp = await fetch('/reserve/status');
    const d = await resp.json();
    const bar = document.getElementById('reserveBar');
    const txt = document.getElementById('reserveText');
    bar.style.width = (d.percent > 100 ? 100 : d.percent) + '%';
    bar.innerText = '₹' + d.reserve.toLocaleString();
    txt.innerText = `Remaining: ₹${d.reserve.toLocaleString()} / ₹${d.default.toLocaleString()}`;
    if (d.percent < 25) {
      bar.classList.remove('bg-success');
      bar.classList.add('bg-danger');
    } else if (d.percent < 60) {
      bar.classList.remove('bg-success');
      bar.classList.add('bg-warning');
    } else {
      bar.classList.remove('bg-warning', 'bg-danger');
      bar.classList.add('bg-success');
    }
  } catch (e) {
    console.error(e);
  }
}

document.getElementById('resetReserveBtn').addEventListener('click', async () => {
  if (!confirm('Reset bank reserve to ₹500,000?')) return;
  const resp = await fetch('/reserve/reset', {method: 'POST'});
  const d = await resp.json();
  if (d.ok) {
    await refreshReserveBar();
    alert('Bank reserve reset.');
  } else {
    alert('Could not reset reserve.');
  }
});

// refresh on load
refreshReserveBar();
</script>
{% endblock %}
