<!DOCTYPE html>
<html>
<head>

  <title>AegisFund AI Results</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body style="background:#020617;color:white;">

<div class="container py-5">

  <div class="text-center mb-5">

    <h1 class="display-4 fw-bold">

      Allocation
      <span style="color:#60a5fa;">
        Results
      </span>

    </h1>

  </div>

  <div class="alert
      {% if status == 'Approved' %}
        alert-success
      {% else %}
        alert-danger
      {% endif %}">

    {{ message|safe }}

  </div>

  <div class="row g-4 mb-5">

    <div class="col-md-4">

      <div class="card bg-dark text-white border-secondary">

        <div class="card-body">

          <h5>Total Funds</h5>

          <h2>
            ₹{{ total_funds }}
          </h2>

        </div>

      </div>

    </div>

    <div class="col-md-4">

      <div class="card bg-dark text-white border-secondary">

        <div class="card-body">

          <h5>Total Allocated</h5>

          <h2>
            ₹{{ total_allocated }}
          </h2>

        </div>

      </div>

    </div>

    <div class="col-md-4">

      <div class="card bg-dark text-white border-secondary">

        <div class="card-body">

          <h5>System State</h5>

          <h2>
            {{ 'SAFE' if safe else 'UNSAFE' }}
          </h2>

        </div>

      </div>

    </div>

  </div>

  <div class="card bg-dark border-secondary p-4 mb-5">

    <canvas id="loanChart"
            height="100">
    </canvas>

  </div>

  <script>

    const ctx =
      document.getElementById('loanChart');

    new Chart(ctx, {

      type: 'bar',

      data: {

        labels:
          {{ loans | map(attribute='name') | list }},

        datasets: [{

          label: 'Approved Amount',

          data:
            {{ loans | map(attribute='approved_amount') | list }}

        }]

      }

    });

  </script>

  <div class="text-center">

    <a href="{{ url_for('home') }}"
       class="btn btn-primary btn-lg">

      Back Home

    </a>

  </div>

</div>

</body>
</html>
